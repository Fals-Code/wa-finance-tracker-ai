version: '3.8'

services:
  wa-bot:
    build: .
    container_name: wa-finance-bot
    restart: always
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ./.wwebjs_auth:/app/.wwebjs_auth
      - ./.wwebjs_cache:/app/.wwebjs_cache
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
